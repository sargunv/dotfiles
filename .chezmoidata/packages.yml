packages:
  common:
    taps:
    brews:
      - chezmoi # dotfiles manager
      - gh # github cli
      - git-delta # fancy git diff viewer
      - git-lfs # git large file storage
      - helix # editor
      - httpie # friendly http client
      - jq # json processor
      - yq # yaml processor
      - tokei # code line counter
      - mise # dev tool manager
      - lazygit # git tui
      - btop # fancy system monitor
      - opencode # opencode cli
      - antidote # zsh plugin manager
      - atuin # zsh history
      - bash-preexec # used by certain bash integrations
      - starship # fancy shell prompt
      - bat # fancy cat
      - eza # fancy ls
      - fd # fancy find
      - fzf # fuzzy finder
      - rg # fancy grep
      - tealdeer # tldr cli docs
      - zoxide # smarter cd command
    casks:
    scripts:
      - https://claude.ai/install.sh # claude code cli

  darwin:
    taps:
    brews:
    casks:
      - font-jetbrains-mono-nerd-font # nerd font for symbols
    scripts:
  linux:
    taps:
    brews:
    scripts:
