# Tools whose own installer is the least surprising source of truth.
self_managed_tools:
  - name: chezmoi
    command: chezmoi
    install: 'sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b "$HOME/.local/bin"'
  - name: mise
    command: mise
    install: "curl https://mise.run | sh"
  - name: codex
    command: codex
    install: "curl -fsSL https://chatgpt.com/codex/install.sh | sh"
  - name: cursor-agent
    command: cursor-agent
    install: "curl https://cursor.com/install -fsS | bash"
  - name: opencode
    command: opencode
    install: "curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path"

post_mise_self_managed_tools:
  - name: pi
    command: pi
    install: 'curl -fsSL https://pi.dev/install.sh | PATH="$HOME/.local/share/mise/shims:$PATH" NPM_CONFIG_PREFIX="$HOME/.local" sh'
