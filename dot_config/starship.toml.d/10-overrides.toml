format = "$username$hostname$directory$git_branch$git_state$git_status$cmd_duration$line_break$mise$character"
right_format = "$time"

[mise]
disabled = false
format = "[$symbol](dimmed)[$health](218) "
symbol = "mise"
healthy_symbol = ""
unhealthy_symbol = "*"

# Add time for easily assembling timelines
[time]
disabled = false
style = "dimmed"

# Simplify directory display
[directory]
truncate_to_repo = false

# libgit2 reports incorrect status in worktrees
[git_status]
use_git_executable = true
